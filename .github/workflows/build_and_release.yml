name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.1.0)'
        required: true
        default: '0.0.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact-name: ipinfoapi-windows-amd64.exe
          - goos: linux
            goarch: amd64
            artifact-name: ipinfoapi-linux-amd64
          - goos: darwin
            goarch: amd64
            artifact-name: ipinfoapi-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact-name: ipinfoapi-darwin-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go 1.23.x
      uses: actions/setup-go@v5
      with:
        go-version: 1.23.x

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o ${{ matrix.artifact-name }} ./cmd/ipinfoapi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.artifact-name }}

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: ./artifacts

    - name: List downloaded files
      run: |
        echo "Current directory: $(pwd)"
        echo "Artifacts directory contents:"
        Get-ChildItem -Path "./artifacts" -Recurse -File | ForEach-Object { echo $_.FullName }

    - name: Get current date
      id: date
      run: |
        $buildDate = Get-Date -Format "yyyy.MM.dd"
        echo "builddate=$buildDate" >> $env:GITHUB_OUTPUT
        echo "Build date: $buildDate"

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        body: |
          ## ipinfoapi v${{ github.event.inputs.version }}
          
          ### 构建信息
          - 版本号: ${{ github.event.inputs.version }}
          - 构建日期: ${{ steps.date.outputs.builddate }}
          - 构建平台: Windows & Linux & macOS
          - Go版本: 1.23.x
          
          ### 下载
          - Windows (AMD64): `ipinfoapi-windows-amd64.exe`
          - Linux (AMD64): `ipinfoapi-linux-amd64`
          - macOS (Intel/AMD64): `ipinfoapi-darwin-amd64`
          - macOS (Apple Silicon/ARM64): `ipinfoapi-darwin-arm64`
        files: ./artifacts/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
