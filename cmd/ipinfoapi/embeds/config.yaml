# ==================== 认证配置 ====================
auth:
  token: "test-token-123456"
  enable: true

# ==================== HTTP服务配置 ====================
http:
  enable: true
  port: 8080
  https: false
  cert_file: "server.crt"
  key_file: "server.key"
  read_timeout: 10    # 读取超时（秒）
  write_timeout: 10   # 写入超时（秒）
  idle_timeout: 30    # 空闲连接超时（秒）

# ==================== 日志配置 ====================
log:
  level: "info"           # 日志级别: debug/info/warn/error
  file: "ipinfoapi.log"  # 日志文件路径
  console: "TLCM"         # 控制台输出格式: T=时间 L=级别 C=调用者 M=消息, off=关闭
  max_size: 100           # 单个日志文件最大大小（MB）
  max_backups: 3          # 保留旧日志文件的最大个数
# ==================== 可选数据库说明 ====================
# ASN数据库选项:
#   - assets/geolite2-asn.mmdb         (GeoLite2 ASN通用库)
#   - assets/geolite2-asn-ipv4.mmdb    (GeoLite2 ASN IPv4库)
#   - assets/geolite2-asn-ipv6.mmdb    (GeoLite2 ASN IPv6库)
#   - assets/dbip-asn.mmdb             (DBIP ASN通用库)
#   - assets/dbip-asn-ipv4.mmdb        (DBIP ASN IPv4库)
#   - assets/dbip-asn-ipv6.mmdb        (DBIP ASN IPv6库)
#
# IP地理位置数据库选项:
#   - assets/qqwry.dat                 (纯真IPv4数据库)
#   - assets/qqwry.ipdb                (IPIP.net格式纯真库)
#   - assets/zxipv6wry.db              (紫薇IPv6数据库)
#   - assets/ip2region_v4.xdb          (IP2Region IPv4库)
#   - assets/ip2region_v6.xdb          (IP2Region IPv6库)
#   - assets/geolite2-city-ipv4.mmdb   (GeoLite2 City IPv4库)
#   - assets/geolite2-city-ipv6.mmdb   (GeoLite2 City IPv6库)
#   - assets/dbip-city-ipv4.mmdb       (DBIP City IPv4库)
#   - assets/dbip-city-ipv6.mmdb       (DBIP City IPv6库)

# 数据库下载地址和对应的存储路径信息
databases:
  - module: ipvx_locate_db
    filename: qqwry.ipdb
    download-urls:
      - https://cdn.jsdelivr.net/npm/qqwry.ipdb/qqwry.ipdb
      - https://unpkg.com/qqwry.ipdb/qqwry.ipdb
    keep-updated: false
    enable: true

  - module: ipv4_locate_db
    filename: qqwry.dat
    download-urls:
      - https://github.com/metowolf/qqwry.dat/releases/latest/download/qqwry.dat
      - https://github.com/winezer0/cdninfo/blob/main/assets/qqwry.dat
    keep-updated: false
    enable: true

  - module: ipv6_locate_db
    filename: zxipv6wry.db
    download-urls:
      - https://github.com/winezer0/cdninfo/blob/main/assets/zxipv6wry.db
      - https://cdn.jsdelivr.net/gh/winezer0/cdninfo/assets/zxipv6wry.db
    keep-updated: false
    enable: true


  - module: asn_ipvx_db
    filename: geolite2-asn.mmdb
    download-urls:
      - https://github.com/sapics/ip-location-db/blob/main/geolite2-asn-mmdb/geolite2-asn.mmdb
      - https://github.com/winezer0/cdninfo/blob/main/assets/geolite2-asn.mmdb
      - https://cdn.jsdelivr.net/gh/winezer0/cdninfo/assets/geolite2-asn.mmdb
    keep-updated: 7d
    enable: true

  - module: asn_ipv4_db
    filename: geolite2-asn-ipv4.mmdb
    download-urls:
      - https://github.com/sapics/ip-location-db/blob/main/geolite2-asn-mmdb/geolite2-asn-ipv4.mmdb
      - https://github.com/winezer0/cdnAnalyzer/blob/main/assets/geolite2-asn-ipv4.mmdb
      - https://cdn.jsdelivr.net/gh/winezer0/cdnAnalyzer/assets/geolite2-asn-ipv4.mmdb
    keep-updated: 7d
    enable: true

  - module: asn_ipv6_db
    filename: geolite2-asn-ipv6.mmdb
    download-urls:
      - https://github.com/sapics/ip-location-db/blob/main/geolite2-asn-mmdb/geolite2-asn-ipv6.mmdb
      - https://github.com/winezer0/cdnAnalyzer/blob/main/assets/geolite2-asn-ipv6.mmdb
      - https://cdn.jsdelivr.net/gh/winezer0/cdnAnalyzer/assets/geolite2-asn-ipv6.mmdb
    keep-updated: 7d
    enable: true